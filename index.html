<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telelenker | Operations</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; line-height: 1.6; color: #223344; background: #f4f7f6; }
        
        /* Fixed Layout for Mobile and Desktop */
        .container { width: 90%; max-width: 900px; margin: 0 auto; text-align: center; padding: 20px 0; }
        
        header { background: #0d2c40; color: white; padding: 50px 0; }
        
        /* Video Styling */
        .video-wrapper { width: 100%; margin: 20px 0; background: #000; border-radius: 10px; overflow: hidden; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .btn { display: block; width: 100%; max-width: 300px; margin: 10px auto; padding: 15px; background: #028a93; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>TELELENKER</h1>
        <p>INTEGRATED OPERATIONS</p>
        <h2 style="margin-top:20px;">Scale Your Automotive & Digital Operations</h2>
    </header>

    <div class="container">
        <h2>Message From Our Lead</h2>
        <div class="video-wrapper">
            <div class="video-container">
                <!-- Yahan apni YouTube video ka link dalein -->
                <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
            </div>
        </div>

        <a href="https://wa.me/YOUR_NUMBER" class="btn">WhatsApp Us</a>
        <a href="https://t.me/YOUR_USERNAME" class="btn">Telegram Us</a>
    </div>

</body>
</html>
