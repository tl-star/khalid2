<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telelenker | Integrated Operations</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; color: #223344; line-height: 1.6; }
        .container { width: 90%; max-width: 800px; margin: 0 auto; text-align: center; padding: 40px 20px; }
        
        header { background: #0d2c40; color: white; padding: 60px 20px; text-align: center; }
        header h1 { font-size: 32px; margin-bottom: 10px; }
        
        .video-wrapper { width: 100%; margin: 30px 0; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .btn { display: block; width: 100%; max-width: 300px; margin: 15px auto; padding: 15px; background: #028a93; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: #016b72; }
    </style>
</head>
<body>

    <header>
        <h1>TELELENKER</h1>
        <p>INTEGRATED OPERATIONS</p>
        <h2 style="margin-top:20px;">Scale Your Automotive & Digital Operations</h2>
    </header>

    <div class="container">
        <h2>Message From Our Lead</h2>
        <div class="video-wrapper">
            <div class="video-container">
                <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
            </div>
        </div>

        <a href="https://wa.me/YOUR_NUMBER" class="btn">WhatsApp Us</a>
        <a href="https://t.me/YOUR_USERNAME" class="btn">Telegram Us</a>
    </div>

</body>
</html>
